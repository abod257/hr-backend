<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
  font-family: Arial;
  background:#eef4ff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:30px;
  width:350px;
  border-radius:12px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  width:100%;
  padding:10px;
  background:#0f172a;
  color:white;
  border:none;
  cursor:pointer;
}
.message{
  margin-top:10px;
  color:red;
}
</style>
</head>

<body>

<div class="card">
  <h2>تسجيل الدخول</h2>

  <input id="employeeName" type="text" placeholder="الاسم">
  <input id="employeeNationalId" type="text" placeholder="رقم الهوية">

  <button onclick="login()">دخول</button>

  <div id="msg" class="message"></div>
</div>

<script>

function login(){

  const name = document.getElementById("employeeName").value.trim();
  const national_id = document.getElementById("employeeNationalId").value.trim();

  if(name === "admin" && national_id === "0000"){
    window.location.href = "/admin-dashboard.html";
    return;
  }

  document.getElementById("msg").innerText = "بيانات غير صحيحة";

}

</script>

</body>
</html>

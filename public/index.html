<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شركة لانا الطبية | تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    body{ font-family:'Cairo',sans-serif; background:#eef4ff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .card{ background:#fff; padding:30px; width:360px; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.1); text-align:center; }
    input{ width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc; box-sizing: border-box; }
    button{ width:100%; padding:12px; border:none; border-radius:10px; background:#0f172a; color:#fff; font-weight:bold; cursor:pointer; margin-top: 10px; }
    button:hover{ opacity:.9; }
    .admin-box{ margin-bottom:20px; text-align:right; }
    .message{ margin-top:10px; font-weight:bold; min-height: 24px; }
  </style>
</head>
<body>

<div class="card">
  <div class="admin-box">
    <details>
      <summary>دخول المسؤول</summary>
      <input id="adminPassword" type="password" placeholder="كلمة المرور">
      <button type="button" onclick="loginAdmin()">دخول المسؤول</button>
    </details>
  </div>

  <h2>تسجيل دخول الموظفين</h2>
  <input id="employeeName" type="text" placeholder="الاسم الكامل">
  <input id="employeeNationalId" type="text" placeholder="رقم الهوية">
  <button type="button" onclick="loginEmployee()">تحقق ودخول</button>

  <div class="message" id="msg"></div>
</div>

<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

// دالة دخول الموظف
async function loginEmployee() {
  const msg = document.getElementById("msg");
  const name = document.getElementById("employeeName").value.trim();
  const national_id = document.getElementById("employeeNationalId").value.trim();
  
  if (!name || !national_id) {
    msg.style.color = "red";
    msg.innerHTML = "⚠️ يرجى تعبئة الحقول";
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, national_id })
    });

    if (!response.ok) {
      msg.style.color = "red";
      msg.innerHTML = "❌ الاسم أو رقم الهوية غير صحيح";
      return;
    }

    const data = await response.json();
    
    // حفظ الجلسة بناءً على هيكل السيرفر (data.user)
    sessionStorage.setItem("empName", data.user.name);
    sessionStorage.setItem("empNationalId", data.user.national_id);
    sessionStorage.setItem("empId", data.user.id);

    msg.style.color = "green";
    msg.innerHTML = "✅ تم تسجيل الدخول بنجاح";
    setTimeout(() => { window.location.href = "employee-dashboard.html"; }, 800);

  } catch (error) {
    msg.style.color = "red";
    msg.innerHTML = "❌ خطأ في الاتصال بالخادم";
  }
}

// دالة دخول المسؤول
function loginAdmin() {
  const msg = document.getElementById("msg");
  const adminPassword = document.getElementById("adminPassword").value.trim();
  
  if (adminPassword === "admin123") {
    window.location.href = "admin-dashboard.html";
  } else {
    msg.style.color = "red";
    msg.innerHTML = "❌ كلمة مرور المسؤول غير صحيحة";
  }
}
</script>

</body>
</html>

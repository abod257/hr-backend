<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شركة لانا الطبية | تسجيل الدخول</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Cairo',sans-serif;
      background:#eef4ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .card{
      background:#fff;
      padding:30px;
      width:360px;
      border-radius:20px;
      box-shadow:0 20px 40px rgba(0,0,0,0.1);
      text-align:center;
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid #ccc;
    }
    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#0f172a;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    button:hover{opacity:.9;}
    .admin-box{
      margin-bottom:20px;
      text-align:right;
    }
    .message{
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="admin-box">
    <details>
      <summary>دخول المسؤول</summary>
      <input id="adminPassword" type="password" placeholder="كلمة المرور">
      <button onclick="loginAdmin()">دخول المسؤول</button>
    </details>
  </div>

  <h2>تسجيل دخول الموظفين</h2>

  <input id="employeeName" type="text" placeholder="الاسم الكامل">
  <input id="employeeNationalId" type="text" placeholder="رقم الهوية">

  <button onclick="loginEmployee()">تحقق ودخول</button>

  <div class="message" id="msg"></div>

</div>

<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

function showMessage(text, color){
  const msg = document.getElementById("msg");
  msg.style.color = color;
  msg.innerHTML = text;
}

/* ✅ تسجيل دخول موظف */
async function loginEmployee() {

  const name = document.getElementById("employeeName").value.trim();
  const national_id = document.getElementById("employeeNationalId").value.trim();

  if (!name || !national_id) {
    showMessage("⚠️ الرجاء إدخال جميع البيانات", "red");
    return;
  }

  try {
    const response = await fetch(API_BASE + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, national_id })
    });

    if (!response.ok) {
      showMessage("❌ الاسم أو رقم الهوية غير صحيح", "red");
      return;
    }

    const data = await response.json();

    // ✅ تخزين الجلسة بشكل موحد
    sessionStorage.setItem("empName", data.employee.name);
    sessionStorage.setItem("empNationalId", data.employee.national_id);
    sessionStorage.setItem("empRole", "employee");

    showMessage("✅ تم تسجيل الدخول بنجاح", "green");

    setTimeout(() => {
      window.location.href = "/employee-dashboard.html";
    }, 800);

  } catch (error) {
    showMessage("❌ خطأ في الاتصال بالخادم", "red");
  }
}

/* ✅ تسجيل دخول مسؤول */
function loginAdmin(){

  const adminPassword = document.getElementById("adminPassword").value.trim();

  if (adminPassword === "admin123") {

    // ✅ تخزين جلسة الأدمن
    sessionStorage.setItem("empRole", "admin");
    sessionStorage.setItem("empName", "Administrator");

    window.location.href = "/admin-dashboard.html";

  } else {
    showMessage("❌ كلمة المرور غير صحيحة", "red");
  }
}

</script>

</body>
</html>

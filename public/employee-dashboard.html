<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة لانا الطبية | لوحة الموظف</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#eef4ff;
  --bg2:#dff1ff;
  --primary:#0f172a;
  --accent:#20c86f;
  --card:#ffffff;
  --muted:#64748b;
  --line:#e2e8f0;
  --shadow:0 25px 60px rgba(15,23,42,.12);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#0f172a;
}

/* Topbar */
.topbar{
  background:var(--primary);
  color:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.topbar h2{
  margin:0;
  font-size:18px;
}
.logout-btn{
  background:#fff;
  color:#0f172a;
  padding:8px 14px;
  border-radius:12px;
  border:none;
  font-weight:700;
  cursor:pointer;
}
.logout-btn:hover{opacity:.9}

/* Layout */
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

.grid{
  display:grid;
  gap:20px;
}

.grid-2{
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
}

.card{
  background:var(--card);
  padding:24px;
  border-radius:24px;
  box-shadow:var(--shadow);
}

.card h3{
  margin-top:0;
  font-size:20px;
  font-weight:900;
  margin-bottom:18px;
}

/* Employee Info */
.info-row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}
.info-row:last-child{border-bottom:none}

.label{
  color:var(--muted);
  font-weight:700;
}
.value{
  font-weight:900;
}

/* Forms */
input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0 14px 0;
  border-radius:14px;
  border:1px solid var(--line);
  font-family:'Cairo',sans-serif;
}
textarea{min-height:100px}

.submit-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}
.submit-btn:hover{opacity:.9}

/* Table */
.table-wrap{
  overflow:auto;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:12px;
  border-bottom:1px solid var(--line);
  text-align:right;
}
th{
  background:#f8fafc;
  font-weight:900;
}

/* Hero */
.hero{
  background:linear-gradient(135deg,#0f172a,#134e4a);
  color:#fff;
  padding:30px;
  border-radius:24px;
  margin-bottom:25px;
}
.hero h1{
  margin:0 0 8px;
  font-size:26px;
}
.hero p{
  margin:0;
  opacity:.9;
}

</style>
</head>
<body>

<div class="topbar">
  <h2>لوحة الموظف</h2>
  <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
</div>

<div class="container">

  <div class="hero">
    <h1>مرحباً بك 👋</h1>
    <p>هذه لوحة الموظف الرسمية المرتبطة مباشرة بقاعدة البيانات.</p>
  </div>

  <div class="grid grid-2">

    <!-- معلومات الموظف -->
    <div class="card">
      <h3>معلومات الموظف</h3>

      <div class="info-row">
        <span class="label">الاسم</span>
        <span id="empName" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">رقم الهوية</span>
        <span id="empNationalId" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">القسم</span>
        <span id="empDepartment" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">المسمى الوظيفي</span>
        <span id="empPosition" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">البريد</span>
        <span id="empEmail" class="value"></span>
      </div>
    </div>

    <!-- طلب إجازة -->
    <div class="card">
      <h3>طلب إجازة</h3>
      <input id="leaveStart" type="date">
      <input id="leaveEnd" type="date">
      <textarea id="leaveReason" placeholder="سبب الإجازة"></textarea>
      <button class="submit-btn">إرسال الطلب</button>
    </div>

    <!-- طلب سلفة -->
    <div class="card">
      <h3>طلب سلفة</h3>
      <input id="loanAmount" type="number" placeholder="المبلغ">
      <textarea id="loanReason" placeholder="سبب السلفة"></textarea>
      <button class="submit-btn">إرسال الطلب</button>
    </div>

    <!-- سجل الطلبات -->
    <div class="card">
      <h3>سجل الطلبات</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>نوع الطلب</th>
              <th>التاريخ</th>
              <th>الحالة</th>
              <th>رد الإدارة</th>
            </tr>
          </thead>
          <tbody id="requestsTable"></tbody>
        </table>
      </div>
    </div>

  </div>

</div>

<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

async function loadEmployee() {

  const name = sessionStorage.getItem("empName");
  const nationalId = sessionStorage.getItem("empNationalId");

  if (!name || !nationalId) {
    window.location.href = "/";
    return;
  }

  const response = await fetch(API_BASE + "/employees");
  const employees = await response.json();

  const employee = employees.find(
    e => e.name === name && e.national_id === nationalId
  );

  if (!employee) {
    window.location.href = "/";
    return;
  }

  document.getElementById("empName").textContent = employee.name;

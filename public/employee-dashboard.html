<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الموظف</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-600 p-4 text-white shadow-lg flex justify-between items-center px-10">
        <h1 class="font-bold text-xl">نظام الموارد البشرية | <span id="empName"></span></h1>
        <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded text-sm hover:bg-red-600">تسجيل خروج</button>
    </nav>

    <div class="container mx-auto p-6">
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-xl font-bold mb-4">طلباتي السابقة</h2>
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="p-3">نوع الطلب</th>
                        <th class="p-3">التاريخ</th>
                        <th class="p-3">الحالة</th>
                        <th class="p-3">رد الإدارة</th>
                    </tr>
                </thead>
                <tbody id="requestsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

        // ✅ قراءة بيانات الجلسة
        const token = sessionStorage.getItem("token");
        const role = sessionStorage.getItem("role");
        const userId = sessionStorage.getItem("userId");
        const empName = sessionStorage.getItem("empName");

        // التأكد من تسجيل الدخول
        if (!token || role !== "employee" || !userId) {
            window.location.href = "/";
        }

        // ✅ Header موحد للطلبات
        function authHeader(isJson = true) {
            const headers = { "Authorization": "Bearer " + token };
            if (isJson) headers["Content-Type"] = "application/json";
            return headers;
        }

        // ✅ عرض الاسم
        document.getElementById("empName").textContent = empName || "موظف";

        // ✅ تحميل البيانات
        async function loadRequests() {
            try {
                const res = await fetch(`${API_BASE}/requests/${userId}`, { headers: authHeader() });
                if (!res.ok) { logout(); return; }
                const data = await res.json();
                const table = document.getElementById("requestsTable");
                table.innerHTML = "";
                data.forEach(r => {
                    table.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3">${r.type}</td>
                            <td class="p-3">${new Date(r.created_at).toLocaleDateString()}</td>
                            <td class="p-3 font-bold text-blue-600">${r.status}</td>
                            <td class="p-3 text-gray-600">${r.admin_reply || "-"}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("خطأ في الاتصال:", error);
            }
        }

        // ✅ تسجيل خروج
        function logout() {
            sessionStorage.clear();
            window.location.href = "/";
        }

        // تنفيذ عند التحميل
        loadRequests();
    </script>
</body>
</html>

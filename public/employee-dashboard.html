<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";
let currentEmployee = null;

/* ✅ تحقق الجلسة */
const role = sessionStorage.getItem("empRole");
const name = sessionStorage.getItem("empName");
const nationalId = sessionStorage.getItem("empNationalId");

if (!role || role !== "employee" || !name || !nationalId) {
  window.location.href = "/";
}

/* ✅ بدء التحميل */
async function init() {

  try {

    const res = await fetch(API_BASE + "/employees");
    const employees = await res.json();

    currentEmployee = employees.find(
      e => e.name === name && e.national_id === nationalId
    );

    if (!currentEmployee) {
      sessionStorage.clear();
      window.location.href = "/";
      return;
    }

    renderEmployee();
    loadRequests();

  } catch (error) {
    alert("حدث خطأ في الاتصال بالخادم");
    window.location.href = "/";
  }
}

function renderEmployee(){
  document.getElementById("empName").textContent = currentEmployee.name;
  document.getElementById("empNationalId").textContent = currentEmployee.national_id;
  document.getElementById("empDepartment").textContent = currentEmployee.department || "-";
  document.getElementById("empPosition").textContent = currentEmployee.position || "-";
  document.getElementById("empEmail").textContent = currentEmployee.email || "-";
}

async function submitRequest(type){

  let details = "";

  if(type==="leave"){
    details = `من ${leaveStart.value} إلى ${leaveEnd.value} - ${leaveReason.value}`;
  }

  if(type==="loan"){
    details = `المبلغ ${loanAmount.value} - ${loanReason.value}`;
  }

  if(type==="complaint"){
    details = complaintText.value;
  }

  if(type==="promotion"){
    details = `${promotionTitle.value} - ${promotionReason.value}`;
  }

  if(!details){
    alert("الرجاء إدخال البيانات");
    return;
  }

  await fetch(API_BASE+"/requests",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      employee_id:currentEmployee.id,
      type,
      details
    })
  });

  loadRequests();
}

async function loadRequests(){

  const res = await fetch(API_BASE+"/requests/"+currentEmployee.id);
  const data = await res.json();

  const table = document.getElementById("requestsTable");
  table.innerHTML="";

  data.forEach(r=>{
    table.innerHTML += `
      <tr>
        <td>${r.type}</td>
        <td>${new Date(r.created_at).toLocaleDateString()}</td>
        <td>${r.status}</td>
        <td>${r.admin_reply || "-"}</td>
      </tr>
    `;
  });
}

async function uploadFile(){

  const file = fileUpload.files[0];
  if(!file){
    alert("اختر ملف أولاً");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("employee_id", currentEmployee.id);

  await fetch("/upload-file",{method:"POST",body:formData});
  alert("✅ تم رفع الملف");
}

function logout(){
  sessionStorage.clear();
  window.location.href="/";
}

init();
</script>

<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

/* ✅ قراءة بيانات الجلسة */
const token = sessionStorage.getItem("token");
const role = sessionStorage.getItem("role");
const userId = sessionStorage.getItem("userId");
const empName = sessionStorage.getItem("empName");

if (!token || role !== "employee" || !userId) {
  window.location.href = "/";
}

/* ✅ Header موحد */
function authHeader(isJson = true){
  const headers = {
    "Authorization": "Bearer " + token
  };
  if (isJson) headers["Content-Type"] = "application/json";
  return headers;
}

/* ✅ عرض الاسم مباشرة */
document.getElementById("empName").textContent = empName;

/* ✅ تحميل طلبات الموظف */
async function loadRequests(){
  try {

    const res = await fetch(API_BASE + "/requests/" + userId, {
      headers: authHeader()
    });

    if (!res.ok) {
      logout();
      return;
    }

    const data = await res.json();

    const table = document.getElementById("requestsTable");
    table.innerHTML = "";

    data.forEach(r=>{
      table.innerHTML += `
        <tr>
          <td>${r.type}</td>
          <td>${new Date(r.created_at).toLocaleDateString()}</td>
          <td>${r.status}</td>
          <td>${r.admin_reply || "-"}</td>
        </tr>
      `;
    });

  } catch (error) {
    alert("خطأ في تحميل البيانات");
  }
}

/* ✅ إرسال طلب */
async function submitRequest(type){

  let details = "";

  if(type==="leave"){
    details = `من ${leaveStart.value} إلى ${leaveEnd.value} - ${leaveReason.value}`;
  }

  if(type==="loan"){
    details = `المبلغ ${loanAmount.value} - ${loanReason.value}`;
  }

  if(type==="complaint"){
    details = complaintText.value;
  }

  if(type==="promotion"){
    details = `${promotionTitle.value} - ${promotionReason.value}`;
  }

  if(!details){
    alert("الرجاء إدخال البيانات");
    return;
  }

  await fetch(API_BASE + "/requests",{
    method:"POST",
    headers: authHeader(),
    body: JSON.stringify({
      employee_id: userId,
      type,
      details
    })
  });

  loadRequests();
}

/* ✅ رفع ملف */
async function uploadFile(){

  const file = fileUpload.files[0];
  if(!file){
    alert("اختر ملف أولاً");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("employee_id", userId);

  await fetch(API_BASE + "/upload-file",{
    method:"POST",
    headers:{
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  alert("✅ تم رفع الملف");
}

/* ✅ تسجيل خروج */
function logout(){
  sessionStorage.clear();
  window.location.href = "/";
}

/* ✅ بدء التحميل */
loadRequests();
</script>

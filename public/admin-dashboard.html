<script>
const API = "https://daring-trust-production-8c34.up.railway.app";

/* ✅ حماية الصفحة - التأكد من وجود توكن */
const token = sessionStorage.getItem("token");
if (!token) {
    window.location.href = "/"; // تحويل لصفحة تسجيل الدخول إذا لم يكن مسجلاً
}

/* ✅ Tabs - التنقل بين الأقسام */
function showTab(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}

/* ================= EMPLOYEES ================= */

async function loadEmployees() {
    try {
        const res = await fetch(`${API}/employees`, {
            headers: {
                "Authorization": `Bearer ${token}` // إرسال التوكن للتحقق
            }
        });
        
        if (res.status === 403 || res.status === 401) {
            logout(); // إذا انتهت صلاحية التوكن، اخرج فوراً
            return;
        }

        const data = await res.json();
        renderEmployees(data);
    } catch (err) {
        console.error("خطأ في تحميل الموظفين:", err);
    }
}

function renderEmployees(data) {
    const table = document.getElementById("employeesTable");
    if (!table) return;
    table.innerHTML = "";

    data.forEach(e => {
        table.innerHTML += `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-3">${e.name}</td>
                <td class="p-3">${e.national_id}</td>
                <td class="p-3">${e.nationality || "-"}</td>
                <td class="p-3">${e.salary || 0}</td>
            </tr>
        `;
    });
}

/* ================= LOGOUT ================= */

function logout() {
    sessionStorage.clear();
    window.location.href = "/";
}

/* ================= INIT ================= */
loadEmployees();
</script>

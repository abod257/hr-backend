<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المسؤول</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 12px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>قائمة الموظفين</h1>
    <table id="employeesTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>رقم الهوية</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="2">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>

    <script>
        // الرابط الكامل للسيرفر الخاص بك لتجنب خطأ 404
        const API = "https://daring-trust-production-8c34.up.railway.app";

        async function loadEmployees() {
            try {
                const res = await fetch(API + "/employees");
                const data = await res.json();
                const tbody = document.querySelector("#employeesTable tbody");
                tbody.innerHTML = "";
                
                data.forEach(e => {
                    tbody.innerHTML += `<tr><td>${e.name}</td><td>${e.national_id}</td></tr>`;
                });
            } catch (err) {
                console.error("خطأ:", err);
                document.querySelector("#employeesTable tbody").innerHTML = "<tr><td colspan='2'>خطأ في الاتصال بالسيرفر</td></tr>";
            }
        }
        loadEmployees();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المسؤول</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 12px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h1>قائمة الموظفين</h1>
    <button onclick="logout()">تسجيل الخروج</button>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>رقم الهوية</th>
                <th>الجنسية</th>
                <th>الراتب</th>
            </tr>
        </thead>
        <tbody id="employeesTable">
            <tr><td colspan="4">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>

    <script>
        const API = "https://daring-trust-production-8c34.up.railway.app";

        async function loadEmployees() {
            try {
                const res = await fetch(API + "/employees");
                const data = await res.json();
                const table = document.getElementById("employeesTable");
                table.innerHTML = "";
                
                if (data.length === 0) {
                    table.innerHTML = "<tr><td colspan='4'>لا يوجد موظفون حالياً</td></tr>";
                    return;
                }

                data.forEach(e => {
                    table.innerHTML += `
                        <tr>
                            <td>${e.name}</td>
                            <td>${e.national_id}</td>
                            <td>${e.nationality || "-"}</td>
                            <td>${e.salary || 0}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("خطأ في التحميل:", err);
                document.getElementById("employeesTable").innerHTML = "<tr><td colspan='4'>خطأ في الاتصال بالسيرفر</td></tr>";
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "/";
        }

        loadEmployees();
    </script>
</body>
</html>

<script>
const API="https://daring-trust-production-8c34.up.railway.app";

/* ✅ تحقق دخول الأدمن */
const role = sessionStorage.getItem("empRole");
if (!role || role !== "admin") {
  location.href="/";
}

/* Tabs */
function showTab(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

let employeesData=[];

/* EMPLOYEES */
async function loadEmployees(){
  const res=await fetch(API+"/employees");
  const data=await res.json();
  employeesData=data;
  renderEmployees(data);
}

function renderEmployees(data){
  const table=document.getElementById("employeesTable");
  table.innerHTML="";
  data.forEach(e=>{
    table.innerHTML+=`
      <tr>
        <td>${e.name}</td>
        <td>${e.national_id}</td>
        <td>${e.department||"-"}</td>
        <td>${e.position||"-"}</td>
        <td>${e.salary||0}</td>
        <td>${e.status}</td>
        <td>
          <button class="btn btn-archive" onclick="archiveEmployee(${e.id})">أرشفة</button>
          <button class="btn btn-delete" onclick="deleteEmployee(${e.id})">حذف</button>
        </td>
      </tr>
    `;
  });
}

function filterEmployees(){
  const val=document.getElementById("searchInput").value.toLowerCase();
  const filtered=employeesData.filter(e=>e.name.toLowerCase().includes(val)||e.national_id.includes(val));
  renderEmployees(filtered);
}

async function deleteEmployee(id){
  await fetch(API+"/employees/"+id,{method:"DELETE"});
  loadEmployees();
}

async function archiveEmployee(id){
  await fetch(API+"/employees/archive/"+id,{method:"PUT"});
  loadEmployees();
}

/* REQUESTS */
async function loadRequests(){
  const res=await fetch(API+"/requests");
  const data=await res.json();
  const table=document.getElementById("requestsTable");
  table.innerHTML="";
  data.forEach(r=>{
    table.innerHTML+=`
      <tr>
        <td>${r.name}</td>
        <td>${r.type}</td>
        <td>${r.details}</td>
        <td>${r.status}</td>
        <td><textarea id="reply_${r.id}">${r.admin_reply||""}</textarea></td>
        <td>
          <button class="btn btn-approve" onclick="updateRequest(${r.id},'approved')">اعتماد</button>
          <button class="btn btn-reject" onclick="updateRequest(${r.id},'rejected')">رفض</button>
        </td>
      </tr>
    `;
  });
}

async function updateRequest(id,status){
  const reply=document.getElementById("reply_"+id).value;
  await fetch(API+"/requests/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status,admin_reply:reply})
  });
  loadRequests();
}

/* SALARY */
async function loadSalary(){
  const res=await fetch(API+"/employees");
  const data=await res.json();
  const table=document.getElementById("salaryTable");
  table.innerHTML="";
  data.forEach(e=>{
    table.innerHTML+=`
      <tr>
        <td>${e.name}</td>
        <td>${e.salary||0}</td>
        <td><button class="btn btn-save" onclick="updateSalary(${e.id})">تعديل</button></td>
      </tr>
    `;
  });
}

async function updateSalary(id){
  const salary=prompt("أدخل الراتب الجديد:");
  if(!salary) return;
  await fetch(API+"/employees/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({salary})
  });
  loadSalary();
}

/* FILES */
async function loadFiles(){
  const res=await fetch(API+"/files");
  const data=await res.json();
  const table=document.getElementById("filesTable");
  table.innerHTML="";
  data.forEach(f=>{
    table.innerHTML+=`
      <tr>
        <td>${f.name}</td>
        <td><a href="/uploads/${f.file_path}" target="_blank">${f.file_name}</a></td>
      </tr>
    `;
  });
}

/* SETTINGS */
async function uploadLogo(){
  const file=logoInput.files[0];
  if(!file) return;
  const formData=new FormData();
  formData.append("logo",file);
  await fetch("/company-logo",{method:"POST",body:formData});
  alert("✅ تم تحديث الشعار");
}

/* ✅ تسجيل خروج نظيف */
function logout(){
  sessionStorage.clear();
  location.href="/";
}

/* تحميل البيانات */
loadEmployees();
loadRequests();
loadSalary();
loadFiles();

</script>

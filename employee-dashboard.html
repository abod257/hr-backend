<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة لانا الطبية | لوحة الموظف</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#eef4ff;
  --bg2:#dff1ff;
  --primary:#0f172a;
  --accent:#20c86f;
  --card:#ffffff;
  --muted:#64748b;
  --line:#e2e8f0;
  --shadow:0 25px 60px rgba(15,23,42,.12);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#0f172a;
}

/* Topbar */
.topbar{
  background:var(--primary);
  color:#fff;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logout-btn{
  background:#fff;
  color:#0f172a;
  padding:8px 14px;
  border-radius:12px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

/* Layout */
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

.grid{
  display:grid;
  gap:20px;
}
.grid-2{
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:25px;
  box-shadow:var(--shadow);
}

.card h3{
  margin-top:0;
  font-size:20px;
  font-weight:900;
  margin-bottom:18px;
}

.info-row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}
.info-row:last-child{border-bottom:none}

.label{
  color:var(--muted);
  font-weight:700;
}
.value{
  font-weight:900;
}

/* Inputs */
input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0 14px 0;
  border-radius:14px;
  border:1px solid var(--line);
  font-family:'Cairo',sans-serif;
}
textarea{min-height:100px}

.submit-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}
.submit-btn:hover{opacity:.9}

/* Hero */
.hero{
  background:linear-gradient(135deg,#0f172a,#134e4a);
  color:#fff;
  padding:30px;
  border-radius:24px;
  margin-bottom:25px;
}
.hero h1{
  margin:0 0 8px;
  font-size:26px;
}
.hero p{
  margin:0;
  opacity:.9;
}

/* Responsive */
@media(max-width:768px){
  .container{margin:20px auto}
}
</style>
</head>
<body>

<div class="topbar">
  <div>لوحة الموظف</div>
  <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
</div>

<div class="container">

  <div class="hero">
    <h1>مرحباً بك 👋</h1>
    <p>هذه لوحة الموظف الرسمية المرتبطة مباشرة بقاعدة البيانات.</p>
  </div>

  <div class="grid grid-2">

    <!-- معلومات الموظف -->
    <div class="card">
      <h3>معلومات الموظف</h3>

      <div class="info-row">
        <span class="label">الاسم</span>
        <span id="empName" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">رقم الهوية</span>
        <span id="empNationalId" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">القسم</span>
        <span id="empDepartment" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">المسمى الوظيفي</span>
        <span id="empPosition" class="value"></span>
      </div>

      <div class="info-row">
        <span class="label">البريد</span>
        <span id="empEmail" class="value"></span>
      </div>
    </div>

    <!-- رفع ملف PDF -->
    <div class="card">
      <h3>رفع ملف PDF</h3>
      <input type="file" id="fileUpload" accept="application/pdf">
      <button class="submit-btn" onclick="uploadFile()">رفع الملف</button>
      <p id="uploadStatus"></p>
    </div>

  </div>

</div>

<script>
const API_BASE = "https://daring-trust-production-8c34.up.railway.app";

// تحميل بيانات الموظف
async function loadEmployee() {

  const name = sessionStorage.getItem("empName");
  const nationalId = sessionStorage.getItem("empNationalId");

  if (!name || !nationalId) {
    window.location.href = "/";
    return;
  }

  const response = await fetch(API_BASE + "/employees");
  const employees = await response.json();

  const employee = employees.find(
    e => e.name === name && e.national_id === nationalId
  );

  if (!employee) {
    window.location.href = "/";
    return;
  }

  document.getElementById("empName").textContent = employee.name;
  document.getElementById("empNationalId").textContent = employee.national_id;
  document.getElementById("empDepartment").textContent = employee.department || "-";
  document.getElementById("empPosition").textContent = employee.position || "-";
  document.getElementById("empEmail").textContent = employee.email || "-";
}

// رفع ملف
async function uploadFile() {

  const fileInput = document.getElementById("fileUpload");
  const status = document.getElementById("uploadStatus");

  if (!fileInput.files.length) {
    status.innerHTML = "اختر ملف PDF أولاً";
    return;
  }

  const employeeId = 1; // مؤقت

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);
  formData.append("employee_id", employeeId);

  try {
    const response = await fetch("/upload-file", {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    status.innerHTML = "✅ تم رفع الملف بنجاح";

  } catch (error) {
    status.innerHTML = "❌ حدث خطأ أثناء الرفع";
  }
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.clear();
  window.location.href = "/";
});

loadEmployee();
</script>

</body>
</html>
